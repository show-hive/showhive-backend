name: dev-ci

on:
  pull_request:
    branches:
      - "develop"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: showhive_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/showhive_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${{ secrets.MYSQL_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}


    steps:
      - name: 레포 내 코드 불러오기
        uses: actions/checkout@v4

      - name: JDK 21버전 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: GitHub Actions에 Gradle CLI 환경 설정
        uses: gradle/actions/setup-gradle@v4

      - name: gradlew 파일에 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 빌드 및 jar 파일 생성
        run: ./gradlew clean build -x test

      - name: 테스트 실행
        run: ./gradlew test

      - name: 테스트 리포트 게시
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ github.workspace }}/**/build/test-results/**/*.xml

      - name: PR에 실패 테스트 코멘트
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: ${{ github.workspace }}/**/build/test-results/**/*.xml
