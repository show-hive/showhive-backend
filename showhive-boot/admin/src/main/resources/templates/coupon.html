<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>쿠폰 서비스</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 800px;
            margin-top: 50px;
        }

        .card {
            margin-bottom: 20px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }

        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        .nav-tabs {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4">쿠폰 서비스</h1>
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link active" href="/ui/coupons">쿠폰 관리</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/ui/policies">쿠폰 정책</a>
        </li>
    </ul>

    <!-- 쿠폰 발급 -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">쿠폰 발급</h5>
        </div>
        <div class="card-body">
            <form id="issueForm">
                <div class="mb-3">
                    <label for="userId" class="form-label">사용자 ID</label>
                    <input type="number" class="form-control" id="userId" required>
                </div>
                <div class="mb-3">
                    <label for="apiVersion" class="form-label">API 버전</label>
                    <select class="form-select" id="apiVersion" required>
                        <option value="v1">v1</option>
                        <option value="v2">v2</option>
                        <option value="v3">v3</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="policyId" class="form-label">쿠폰 정책</label>
                    <select class="form-select" id="policyId" required>
                        <option value="">선택하세요</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">발급</button>
            </form>
        </div>
    </div>

    <!-- 쿠폰 사용 -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">쿠폰 사용</h5>
        </div>
        <div class="card-body">
            <form id="useForm">
                <div class="mb-3">
                    <label for="couponId" class="form-label">쿠폰 ID</label>
                    <input type="text" class="form-control" id="couponId" required>
                </div>
                <div class="mb-3">
                    <label for="orderId" class="form-label">주문 ID</label>
                    <input type="number" class="form-control" id="orderId" required>
                </div>
                <button type="submit" class="btn btn-success">사용</button>
            </form>
        </div>
    </div>

    <!-- 쿠폰 취소 -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">쿠폰 사용 취소</h5>
        </div>
        <div class="card-body">
            <form id="cancelForm">
                <div class="mb-3">
                    <label for="cancelCouponId" class="form-label">쿠폰 ID</label>
                    <input type="text" class="form-control" id="cancelCouponId" required>
                </div>
                <button type="submit" class="btn btn-danger">취소</button>
            </form>
        </div>
    </div>

    <!-- 결과 표시 영역 -->
    <div id="result" class="result"></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    let currentApiVersion = 'v1';

    function showResult(message, isSuccess) {
        const $r = $('#result');
        $r.removeClass('success error').addClass(isSuccess ? 'success' : 'error');
        $r.text(message).show();
        setTimeout(() => $r.fadeOut(), 5000);
    }

    // ★ 유저 ID 가져오기 + 검증 (빈값/NaN 방지)
    function getUserIdOrThrow() {
        const v = ($('#userId').val() ?? '').toString().trim();
        if (!/^\d+$/.test(v)) {
            throw new Error('유효한 사용자 ID를 입력하세요.');
        }
        return v; // 문자열 그대로 반환 (헤더는 문자열이 안전)
    }

    function loadPolicies() {
        fetch(`/api/${currentApiVersion}/coupon-policies`)
            .then(r => r.json())
            .then(policies => {
                const $sel = $('#policyId');
                $sel.empty().append('<option value="">선택하세요</option>');
                policies.forEach(p => $sel.append(`<option value="${p.id}">${p.name} (${p.discountValue}원 할인)</option>`));
            })
            .catch(e => showResult('쿠폰 정책 목록을 불러오는데 실패했습니다: ' + e.message, false));
    }

    function handleApiResponse(response) {
        if (!response.ok) {
            return response.text().then(text => { throw new Error(text); });
        }
        return response.json();
    }

    $(function () {
        loadPolicies();

        $('#apiVersion').on('change', function () {
            currentApiVersion = $(this).val();
            loadPolicies();
        });

        // 발급
        $('#issueForm').on('submit', function (e) {
            e.preventDefault();
            let userId;
            try {
                userId = getUserIdOrThrow(); // ★ 헤더에 쓸 값 확보
            } catch (err) {
                showResult(err.message, false);
                return;
            }

            const policyVal = $('#policyId').val();
            if (!policyVal) { showResult('쿠폰 정책을 선택하세요.', false); return; }

            fetch(`/api/${currentApiVersion}/coupons/issue`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-USER-ID': userId  // ★ 문자열로 전달
                },
                body: JSON.stringify({ couponPolicyId: parseInt(policyVal, 10) })
            })
                .then(handleApiResponse)
                .then(data => {
                    showResult(`쿠폰이 발급되었습니다. (쿠폰 ID: ${data.couponId})`, true);
                    // ★ reset 후 userId 복원
                    $('#issueForm')[0].reset();
                    $('#userId').val(userId);
                })
                .catch(error => showResult('쿠폰 발급에 실패했습니다: ' + error.message, false));
        });

        // 사용
        $('#useForm').on('submit', function (e) {
            e.preventDefault();
            let userId;
            try {
                userId = getUserIdOrThrow();
            } catch (err) { showResult(err.message, false); return; }

            const couponId = $('#couponId').val();
            const orderId = parseInt($('#orderId').val(), 10);
            if (!couponId || Number.isNaN(orderId)) { showResult('쿠폰 ID/주문 ID를 확인하세요.', false); return; }

            fetch(`/api/${currentApiVersion}/coupons/${encodeURIComponent(couponId)}/use`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-USER-ID': userId
                },
                body: JSON.stringify({ orderId })
            })
                .then(handleApiResponse)
                .then(data => {
                    showResult('쿠폰이 사용되었습니다.', true);
                    $('#useForm')[0].reset();
                })
                .catch(error => showResult('쿠폰 사용에 실패했습니다: ' + error.message, false));
        });

        // 취소
        $('#cancelForm').on('submit', function (e) {
            e.preventDefault();
            let userId;
            try {
                userId = getUserIdOrThrow();
            } catch (err) { showResult(err.message, false); return; }

            const couponId = $('#cancelCouponId').val();
            if (!couponId) { showResult('쿠폰 ID를 입력하세요.', false); return; }

            fetch(`/api/${currentApiVersion}/coupons/${encodeURIComponent(couponId)}/cancel`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-USER-ID': userId
                }
            })
                .then(handleApiResponse)
                .then(data => {
                    showResult('쿠폰 사용이 취소되었습니다.', true);
                    $('#cancelForm')[0].reset();
                })
                .catch(error => showResult('쿠폰 취소에 실패했습니다: ' + error.message, false));
        });
    });
</script>

</body>
</html>
